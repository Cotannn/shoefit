name: shoefit
description: "ShoeFit - Shoe E-Commerce Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  image_picker: ^1.2.0
  flutter_stripe: ^12.0.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/shoefit_logo.png
